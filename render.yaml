services:
  - type: web
    name: formly-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    branch: main
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_URL
        value: https://formly-dashboard.vercel.app
