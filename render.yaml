services:
  - type: web
    name: formly-api
    runtime: python
    buildCommand: pip install -r requirements.txt && (playwright install --with-deps chromium || playwright install chromium || echo "Playwright browser install skipped")
    startCommand: uvicorn formly.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_URL
        value: https://formly-dashboard.vercel.app
    plan: free
    branch: main
