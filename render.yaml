services:
  - type: web
    name: formly-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn formly.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    plan: free
    branch: main
