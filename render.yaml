services:
  - type: web
    name: formly-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn formly.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DASHBOARD_URL
        value: https://formly-dashboard.vercel.app
    plan: free
    branch: main
