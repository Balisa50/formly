services:
  - type: web
    name: formly-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: uvicorn formly.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DASHBOARD_URL
        value: https://formly-dashboard.vercel.app
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
    plan: free
    branch: main
